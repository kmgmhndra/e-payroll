version: '3.3'
services:
  # ================================
  # 1. APLIKASI LARAVEL (PHP + Nginx)
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kemenkum-payroll-app
    restart: unless-stopped
    ports:
      - "9090:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:9090
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=kemenkum_payroll
      - DB_USERNAME=kemenkum
      - DB_PASSWORD=rahasia123
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kemenkum-net

  # ================================
  # 2. DATABASE MYSQL
  # ================================
  db:
    image: mysql:8.0
    container_name: kemenkum-payroll-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kemenkum_payroll
      MYSQL_USER: kemenkum
      MYSQL_PASSWORD: rahasia123
      MYSQL_ROOT_PASSWORD: rootpassword123
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kemenkum-net

volumes:
  db-data:
    driver: local
  app-storage:
    driver: local

networks:
  kemenkum-net:
    driver: bridge
