; ================================
; PHP Production Overrides
; Kemenkum Payroll
; ================================

; Upload & Memory (untuk import Excel & generate PDF ZIP)
upload_max_filesize = 20M
post_max_size = 25M
memory_limit = 512M
max_execution_time = 300

; OPcache (Production Performance)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0

; Security
expose_php = Off
display_errors = Off
log_errors = On
error_log = /var/log/php-errors.log

; Timezone
date.timezone = Asia/Makassar
